name: MacOS Build for GNU Emacs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */3 * *'

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Uninstall Homebrew
        run: |
          curl -O https://raw.githubusercontent.com/Homebrew/install/HEAD/uninstall.sh
          sudo chmod +x uninstall.sh
          sudo env NONINTERACTIVE=1 ./uninstall.sh
          sudo rm -rf /opt/homebrew
          export PATH=''
          eval $(/usr/libexec/path_helper -s)
      - name: Install GNU M4
        run: |
          curl -LO https://ftp.wayne.edu/gnu/m4/m4-1.4.21.tar.gz
          tar -zxf m4-1.4.21.tar.gz && cd m4-1.4.21
          ./configure && make -j4
          sudo make install
      - name: Install GNU Autoconf
        run: |
          curl -LO https://ftp.wayne.edu/gnu/autoconf/autoconf-2.72.tar.gz
          tar -zxf autoconf-2.72.tar.gz && cd autoconf-2.72
          ./configure && make -j4
          sudo make install
      - name: Install GNU Automake
        run: |
          curl -LO https://ftp.wayne.edu/gnu/automake/automake-1.18.tar.gz
          tar -zxf automake-1.18.tar.gz && cd automake-1.18
          ./configure && make -j4
          sudo make install
      - name: Install GNU Libtool
        run: |
          curl -LO https://ftp.wayne.edu/gnu/libtool/libtool-2.5.4.tar.gz
          tar -zxf libtool-2.5.4.tar.gz && cd libtool-2.5.4
          ./configure --disable-shared && make -j4
          sudo make install
      - name: Install Pkgconf
        run: |
          curl -LO https://github.com/pkgconf/pkgconf/archive/refs/tags/pkgconf-2.5.1.tar.gz
          tar -zxf pkgconf-2.5.1.tar.gz && cd pkgconf-pkgconf-2.5.1
          ./autogen.sh && ./configure --disable-shared && make -j4
          sudo make install
          sudo ln -s /usr/local/bin/pkgconf /usr/local/bin/pkg-config
      - name: Install GNU Texinfo
        run: |
          curl -LO https://ftp.wayne.edu/gnu/texinfo/texinfo-7.3.tar.gz
          tar -zxf texinfo-7.3.tar.gz && cd texinfo-7.3
          ./configure && make -j4
          sudo make install
      - name: Install GNU Libiconv
        run: |
          curl -LO https://ftp.wayne.edu/gnu/libiconv/libiconv-1.19.tar.gz
          tar -zxf libiconv-1.19.tar.gz && cd libiconv-1.19
          ./configure --disable-shared && make -j4
          sudo make install
      - name: Install GNU Libunistring
        run: |
          curl -LO https://ftp.wayne.edu/gnu/libunistring/libunistring-1.4.2.tar.gz
          tar -zxf libunistring-1.4.2.tar.gz && cd libunistring-1.4.2
          ./configure --disable-shared && make -j4
          sudo make install
      - name: Install GNU Gettext
        run: |
          curl -LO https://ftp.wayne.edu/gnu/gettext/gettext-1.0.tar.gz
          tar -zxf gettext-1.0.tar.gz && cd gettext-1.0
          ./configure --disable-shared && make -j4
          sudo make install
      - name: Install GNU Ncurses
        run: |
          curl -LO https://ftp.wayne.edu/gnu/ncurses/ncurses-6.6.tar.gz
          tar -zxf ncurses-6.6.tar.gz && cd ncurses-6.6
          ./configure --disable-shared && make -j4
          sudo make install
          sudo ln -s /usr/local/include/ncursesw/curses.h /usr/local/include/ncurses.h
      - name: Install Zlib
        run: |
          curl -LO https://github.com/madler/zlib/releases/download/v1.3.2/zlib-1.3.2.tar.gz
          tar -zxf zlib-1.3.2.tar.gz && cd zlib-1.3.2
          ./configure --static && make -j4
          sudo make install
      - name: Install Libxml2
        run: |
          curl -O https://download.gnome.org/sources/libxml2/2.15/libxml2-2.15.2.tar.xz
          tar -Jxf libxml2-2.15.2.tar.xz && cd libxml2-2.15.2
          ./configure --disable-shared && make -j4
          sudo make install
      - name: Install GNU Libgmp
        run: |
          curl -LO https://ftp.wayne.edu/gnu/gmp/gmp-6.3.0.tar.gz
          tar -zxf gmp-6.3.0.tar.gz && cd gmp-6.3.0
          ./configure --disable-shared && make -j4
          sudo make install
      - name: Install Libnettle
        run: |
          curl -LO https://ftp.wayne.edu/gnu/nettle/nettle-3.10.2.tar.gz
          tar -zxf nettle-3.10.2.tar.gz && cd nettle-3.10.2
          ./configure --disable-shared && make -j4
          sudo make install
      - name: Install Libidn2
        run: |
          curl -LO https://ftp.wayne.edu/gnu/libidn/libidn2-2.3.8.tar.gz
          tar -zxf libidn2-2.3.8.tar.gz && cd libidn2-2.3.8
          ./configure --disable-shared && make -j4
          sudo make install
      - name: Install GnuTLS
        run: |
          curl -O https://www.gnupg.org/ftp/gcrypt/gnutls/v3.8/gnutls-3.8.12.tar.xz
          tar -Jxf gnutls-3.8.12.tar.xz && cd gnutls-3.8.12
          ./configure --disable-shared --with-included-libtasn1 --without-p11-kit && make -j4
          sudo make install
      - name: Install Libtreesitter
        run: |
          curl -LO https://github.com/tree-sitter/tree-sitter/archive/refs/tags/v0.26.6.tar.gz
          tar -zxf v0.26.6.tar.gz && cd tree-sitter-0.26.6
          make -j4
          sudo make install
          sudo find /usr/local/lib -name 'libtree-sitter*.dylib' -delete
      - name: Install SQLite3
        run: |
          curl -O https://sqlite.org/2026/sqlite-autoconf-3520000.tar.gz
          tar -zxf sqlite-autoconf-3520000.tar.gz && cd sqlite-autoconf-3520000
          ./configure --disable-shared && make -j4
          sudo make install
      - name: Install GNU Gzip
        run: |
          curl -LO https://ftp.wayne.edu/gnu/gzip/gzip-1.14.tar.gz
          tar -zxf gzip-1.14.tar.gz && cd gzip-1.14
          ./configure && make -j4
          sudo make install
      - name: Build Emacs
        run: |
          git clone --depth 1 https://github.com/emacs-mirror/emacs.git
          cd emacs && sed -i '' '/darwin/ s/lncurses/lncursesw/g' configure.ac
          ./autogen.sh && ./configure CFLAGS='-O2 -g0 -flto=thin'     \
                                      PKG_CONFIG='pkgconf -static'    \
                                      --disable-gc-mark-trace         \
                                      --without-all                   \
                                      --with-compress-install         \
                                      --with-file-notification=kqueue \
                                      --with-gmp                      \
                                      --with-gnutls                   \
                                      --with-modules                  \
                                      --with-native-image-api         \
                                      --with-ns                       \
                                      --with-small-ja-dic             \
                                      --with-threads                  \
                                      --with-toolkit-scroll-bars      \
                                      --with-tree-sitter              \
                                      --with-xml2                     \
                                      --with-zlib                     \
                                      --with-sqlite3
          make -j4 && make install
          ditto nextstep/Emacs.app Emacs.app
          echo version=$(Emacs.app/Contents/MacOS/Emacs --version | sed -nE 's/^GNU Emacs ([0-9.]+).*/\1/p') >> $GITHUB_ENV
          tar -Jcf Emacs.tar.xz Emacs.app
      - name: Build Emacs with MPS
        run: |
          git clone -b 'feature/igc3' --depth 1 https://github.com/emacs-mirror/emacs.git emacs-igc
          cd emacs-igc && sed -i '' '/darwin/ s/lncurses/lncursesw/g' configure.ac
          ./autogen.sh && ./configure CFLAGS='-O2 -g0 -flto=thin'     \
                                      PKG_CONFIG='pkgconf -static'    \
                                      --disable-gc-mark-trace         \
                                      --without-all                   \
                                      --with-compress-install         \
                                      --with-file-notification=kqueue \
                                      --with-gmp                      \
                                      --with-gnutls                   \
                                      --with-modules                  \
                                      --with-mps                      \
                                      --with-native-image-api         \
                                      --with-ns                       \
                                      --with-small-ja-dic             \
                                      --with-threads                  \
                                      --with-toolkit-scroll-bars      \
                                      --with-tree-sitter              \
                                      --with-xml2                     \
                                      --with-zlib                     \
                                      --with-sqlite3
          make -j4 && make install
          ditto nextstep/Emacs.app Emacs.app
          echo igc_version=$(Emacs.app/Contents/MacOS/Emacs --version | sed -nE 's/^GNU Emacs ([0-9.]+).*/\1/p') >> $GITHUB_ENV
          tar -Jcf Emacs-MPS.tar.xz Emacs.app
      - name: Upload Emacs
        uses: actions/upload-artifact@v6
        with:
          name: Emacs-${{ env.version }}
          path: emacs/Emacs.tar.xz
          retention-days: 10
      - name: Upload Emacs with MPS
        uses: actions/upload-artifact@v6
        with:
          name: Emacs-MPS-${{ env.igc_version }}
          path: emacs-igc/Emacs-MPS.tar.xz
          retention-days: 10
  cleanup:    
    name: Keep only last 3 successful runs    
    runs-on: ubuntu-latest    
    needs: build          # 等 build job 完成后才执行    
    if: success()         # 只有 build 成功时才触发清理    
    permissions:      
      actions: write    
    steps:      
      - name: Delete old successful runs        
        uses: Mattraks/delete-workflow-runs@v2        
        with:          
          token: ${{ github.token }}          
          repository: ${{ github.repository }}          
          retain_days: 0          
          keep_minimum_runs: 3          
          delete_run_by_conclusion_pattern: success          
          delete_workflow_pattern: "MacOS Build for GNU Emacs"